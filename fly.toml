# app name is set via `fly launch`/`fly apps create` — replace before first deploy
app = "finance-dash"
primary_region = "gru"

[build]

[env]
  NODE_ENV = "production"
  DATA_DIR = "/data"
  PORT = "3333"

[mounts]
  source = "finance_dash_data"
  destination = "/data"

[http_service]
  internal_port = 3333
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"
